<!DOCTYPE html>
<html lang="de">
<head>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suche Ergebnisse | Platz-Börse</title>
    <meta name="description" content="Finden Sie Ihren Platz in unseren Suchergebnissen. Filtern Sie nach Ort und Kategorie, um das perfekte Inserat auf der Platz-Börse zu finden.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/banner.css">
</head>
<body>
    <!-- Side Banners -->
    <div class="side-banner side-banner-left"></div>
    <div class="side-banner side-banner-right"></div>

    <div class="fixed-header-bg"></div>
    <header>
        <div class="navbar">
            <a href="index.html" class="logo-container" style="display: flex; align-items: center; gap: 1rem; text-decoration: none;">
                <img src="assets/logo.svg?v=2" alt="Platz-Börse Logo" class="logo-image" style="height: 48px; width: auto;">
            </a>
            
            <div class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul class="nav-links">
                <li class="dropdown category-item">
                    <a href="#" style="cursor: default;">Kategorien ▾</a>
                    <div class="dropdown-content">
                        <a href="search.html?hauptgruppe=Plätze"><b>Plätze</b></a>
                        <a href="search.html?hauptgruppe=Fahrzeuge"><b>Fahrzeuge</b></a>
                        <a href="search.html?hauptgruppe=Kleinanzeigen"><b>Kleinanzeigen</b></a>
                    </div>
                </li>
                <li><a href="register.html" class="btn" style="background: linear-gradient(135deg, #ff9800, #f57c00); color: white; padding: 0.4rem 1rem; border-radius: 50px; font-weight: 700; text-decoration: none;" onclick="sessionStorage.setItem(''pendingAction'', ''new-listing'');">Jetzt Inserieren</a></li>
                <li id="auth-nav-item"><a href="login.html" class="btn btn-primary" style="color: white; padding: 0.4rem 1rem;">Login / Registrieren</a></li>
            </ul>
        </div>
    </header>

    <div class="container" style="padding-top: 2rem; min-height: 60vh;">
        <h1 class="section-title">Suchergebnisse</h1>
        
        <div class="search-container" style="background: rgba(0,0,0,0.03); padding: 1.5rem; border-radius: 8px; max-width: 800px; margin: 0 auto 3rem auto;">
            <form action="search.html" method="GET" id="hero-search-form" style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <div style="flex: 1.5; min-width: 150px;">
                    <input type="text" name="ort" id="search-location" placeholder="Ort / PLZ..." style="width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; box-sizing: border-box;">
                </div>
                <div style="flex: 1.5; min-width: 150px;">
                    <select name="hauptgruppe" id="search-main-category" style="width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; background: white; box-sizing: border-box;">
                        <option value="">Hauptgruppen...</option>
                        <option value="Plätze">Plätze</option>
                        <option value="Fahrzeuge">Fahrzeuge</option>
                        <option value="Kleinanzeigen">Kleinanzeigen</option>
                    </select>
                </div>
                <div style="flex: 1.5; min-width: 150px;" id="category-filter-wrapper">
                    <select name="kategorie" id="search-category" style="width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; background: white; box-sizing: border-box;">
                        <option value="">Kategorien...</option>
                        <!-- Dynamisch befüllt -->
                    </select>
                </div>
                <div style="flex: 1.5; min-width: 150px;">
                    <select name="transaktion" id="search-transaction" style="width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; background: white; box-sizing: border-box;">
                        <option value="">Alle Optionen</option>
                        <option value="Mieten">Miete / Pacht</option>
                        <option value="Kaufen">Kauf</option>
                        <option value="Verschenken">Zu verschenken</option>
                    </select>
                </div>
                <div style="flex: 1; min-width: 120px;">
                    <button type="submit" class="btn btn-primary" style="padding: 0.8rem 1rem; border-radius: 4px; width: 100%; height: 100%; box-sizing: border-box;">Suchen</button>
                </div>
            </form>
            
            <!-- Erweiterte Filter für Maße -->
            <div id="advanced-filters" style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #ddd; display: none;">
                <p style="font-weight: 600; margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-primary);">📏 Mindestmaße (optional):</p>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 100px;">
                        <label style="display: block; font-size: 0.75rem; color: #666; margin-bottom: 4px;">Min. Länge (m)</label>
                        <input type="number" name="min_l" id="search-min-l" step="0.1" placeholder="z.B. 7.0" style="width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <div style="flex: 1; min-width: 100px;">
                        <label style="display: block; font-size: 0.75rem; color: #666; margin-bottom: 4px;">Min. Breite (m)</label>
                        <input type="number" name="min_b" id="search-min-b" step="0.1" placeholder="z.B. 2.5" style="width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <div style="flex: 1; min-width: 100px;">
                        <label style="display: block; font-size: 0.75rem; color: #666; margin-bottom: 4px;">Min. Höhe (m)</label>
                        <input type="number" name="min_h" id="search-min-h" step="0.1" placeholder="z.B. 3.0" style="width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                </div>
            </div>
            
            <button type="button" id="toggle-filters-btn" style="margin-top: 1rem; background: none; border: none; color: var(--primary-color); cursor: pointer; font-size: 0.85rem; font-weight: 600; text-decoration: underline; padding: 0;">
                + Maße-Filter (Länge/Breite/Höhe) einblenden
            </button>
        </div>

        <div id="search-results-container" class="properties-grid">
            <div style="grid-column: 1 / -1; text-align: center; padding: 2rem;">
                <p>Suche läuft...</p>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-bottom" style="margin-top: 0;">
            &copy; 2026 Vermietung Gutschelhofer. Alle Rechte vorbehalten.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script src="js/geocoding.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
